# Render Blueprint — provisions backend + frontend in one click.
# Docs: https://render.com/docs/blueprint-spec
#
# After connecting this repo as a Blueprint on Render, fill the secret env
# vars marked `sync: false` in the Render dashboard before the first deploy.

services:
  # ─────────────────────────────────────────────────────────────────────
  # Backend — Node Web Service
  # ─────────────────────────────────────────────────────────────────────
  - type: web
    name: cems-backend
    runtime: node
    plan: free
    region: oregon          # change to 'singapore' for lower India latency if available on free
    rootDir: server
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000          # Render's expected port for Node services
      - key: API_PREFIX
        value: /api/v1
      - key: BODY_LIMIT
        value: 1mb
      # Frontend origin — set this AFTER the first frontend deploy so we know
      # the actual *.onrender.com URL. Update in the Render dashboard.
      - key: CORS_ORIGIN
        sync: false
      # Database
      - key: MONGO_URI
        sync: false
      # Auth
      - key: BCRYPT_COST
        value: 12
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: JWT_ISSUER
        value: cems-backend
      - key: JWT_AUDIENCE
        value: cems-clients
      # Logistics
      - key: GATE_PASS_HMAC_SECRET
        generateValue: true
      - key: GATE_PASS_TTL_HOURS
        value: 12

  # ─────────────────────────────────────────────────────────────────────
  # Frontend — Static Site (Vite build → /dist)
  # ─────────────────────────────────────────────────────────────────────
  - type: web
    name: cems-frontend
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    # SPA routing — every unknown path falls back to index.html so react-router works.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    envVars:
      # Backend origin — set this AFTER the first backend deploy so we know
      # the actual *.onrender.com URL. Update in the Render dashboard.
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_APP_NAME
        value: CEMS
      - key: VITE_APP_TAGLINE
        value: College Event Management System
      - key: VITE_COLLEGE_NAME
        value: GLA University
      - key: VITE_BRAND_INITIAL
        value: C
      - key: VITE_ACCESS_TOKEN_KEY
        value: cems.access_token
      - key: VITE_REFRESH_TOKEN_KEY
        value: cems.refresh_token
      - key: VITE_USER_KEY
        value: cems.user
      - key: VITE_RSVPS_KEY
        value: cems.rsvps
      - key: VITE_PASSES_KEY
        value: cems.passes
      - key: VITE_REQUEST_TIMEOUT_MS
        value: 15000
      - key: VITE_PAGE_SIZE
        value: 20
      - key: VITE_DEPARTMENTS
        value: CSE,ECE,ME,CE,EEE,IT,AIML,MBA
      - key: VITE_YEARS
        value: 1,2,3,4,5
      - key: VITE_ASSET_CATEGORIES
        value: PROJECTOR,MICROPHONE,SPEAKER,CHAIR,TABLE,OTHER
