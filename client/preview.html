<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CEMS — design preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/styles/index.css" />
  <style>
    /* Preview-only banner pinned to the top */
    .preview-ribbon {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 8px 16px;
      background: #0F172A; color: #fff;
      font-size: 12px; font-weight: 500;
      display: flex; align-items: center; justify-content: center; gap: 16px;
      letter-spacing: 0.02em;
    }
    .preview-ribbon code { background: rgba(255,255,255,0.12); padding: 1px 6px; border-radius: 4px; font-family: ui-monospace, monospace; }
    body { padding-top: 36px; }
    .topbar { top: 36px !important; }
    .sidebar { top: 36px !important; height: calc(100dvh - 36px) !important; }
  </style>
</head>
<body>
  <div class="preview-ribbon">
    <span>📐 Design preview · mocked data · the deployable app is in <code>src/</code></span>
    <span>Run <code>npm install &amp;&amp; npm run dev</code> to connect to your backend</span>
  </div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="preview/mock.js"></script>
  <script type="text/babel" src="preview/icons.jsx"></script>
  <script type="text/babel" src="preview/primitives.jsx"></script>
  <script type="text/babel" src="preview/screens.jsx"></script>
  <script type="text/babel" src="preview/app.jsx"></script>
</body>
</html>
